name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Phase 2a bumped ruff target-version to py311, which let pyupgrade
        # rewrite code to 3.11-only syntax (``from datetime import UTC``).
        # Match the CI matrix so we do not test combinations the source no
        # longer supports.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev,flask]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Check import
        run: python -c "from oubliette_dungeon import RedTeamOrchestrator; print('Import OK')"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check src/
      - name: Ruff format check
        run: ruff format --check src/

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci --no-audit

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

  build:
    runs-on: ubuntu-latest
    needs: [test, dashboard]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          pip install build
          python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
