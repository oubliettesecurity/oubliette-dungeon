# ==============================================================================
# SCENARIO SUMMARY -- CRESCENDO ATTACKS
# ==============================================================================
# Total New Scenarios: 15 (ATK-058 through ATK-072)
#
# By Sub-Category:
#   - Gradual Context Poisoning: 5 (ATK-058 to ATK-062)
#   - Role Authority Escalation: 2 (ATK-063, ATK-064)
#   - Semantic Misdirection via Analogies: 3 (ATK-065, ATK-066, ATK-067)
#   - Multi-Vector Combination Attacks: 3 (ATK-068, ATK-069, ATK-070)
#   - Session Persistence Probing: 2 (ATK-071, ATK-072)
#
# All scenarios are multi-turn (5+ turns each)
# Difficulty: 5 advanced, 10 hard
# ==============================================================================
